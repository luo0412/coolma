display_name: 为知笔记 API 集成
short_description: 集成为知笔记 REST API，支持笔记同步、文件夹管理、资源上传下载等功能
default_prompt: |
  我想将 Memocast 与为知笔记同步，应该如何实现？

  1. 首先请阅读 wiznote-api skill 中的 API 文档
  2. 了解当前 Memocast 的同步服务架构（参考 sync-design skill）
  3. 设计一个集成方案，包括：
     - 账号认证流程
     - 笔记 CRUD 操作
     - 离线优先同步策略
     - 冲突处理机制
